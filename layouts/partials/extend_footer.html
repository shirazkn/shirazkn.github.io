<script>
// Enable :active CSS states on iOS (requires a touch listener on document)
document.addEventListener('touchstart', function() {}, { passive: true });

// Sync .dark class with data-theme attribute
function syncDarkClass() {
    const isDark = document.documentElement.dataset.theme === 'dark';
    document.documentElement.classList.toggle('dark', isDark);
    document.body.classList.toggle('dark', isDark);
}
syncDarkClass();

// (Theme toggle click handler is in footer.html)

// Wrap letters in spans for hover effect (preserving word boundaries)
document.querySelectorAll('.logo a, .post-title').forEach(el => {
    el.innerHTML = el.textContent.trim().split(' ').map(word =>
        `<span class="hover-word">${word.split('').map(char =>
            `<span class="hover-letter">${char}</span>`
        ).join('')}</span>`
    ).join(' ');
});

// Random color on hover (theme pink + vibrant blue, pink more frequent)
const isDark = () => document.body.classList.contains('dark');
const hoverColorsDark = ['#ff51af', '#ff51af', '#f161ac', '#f161ac', '#db327e', '#db327e', '#3b82f6', '#38bdf8'];
const hoverColorsLight = ['#ff51af', '#ff51af', '#e83a89', '#e83a89', '#f542a1', '#d6306f', '#3b9eff', '#00c2ff'];
const getHoverColors = () => isDark() ? hoverColorsDark : hoverColorsLight;

// Desktop: mouse hover effect
document.querySelectorAll('.hover-letter').forEach(letter => {
    letter.addEventListener('mouseenter', () => {
        const colors = getHoverColors();
        letter.style.color = colors[Math.floor(Math.random() * colors.length)];
    });
    letter.addEventListener('mouseleave', () => {
        letter.style.color = '';
    });
});

// Mobile: touch effect - drag finger across letters
if (window.matchMedia('(pointer: coarse)').matches) {
    let lastTouchedLetter = null;

    const activateLetter = (letter) => {
        if (letter === lastTouchedLetter) return;
        // Reset previous letter
        if (lastTouchedLetter) {
            lastTouchedLetter.style.color = '';
            lastTouchedLetter.style.top = '';
        }
        // Activate new letter
        const colors = getHoverColors();
        letter.style.transition = 'top 0.05s ease-out, color 0s';
        letter.style.color = colors[Math.floor(Math.random() * colors.length)];
        letter.style.top = '-0.08em';
        lastTouchedLetter = letter;
    };

    const deactivateLetter = () => {
        if (lastTouchedLetter) {
            lastTouchedLetter.style.transition = '';
            lastTouchedLetter.style.color = '';
            lastTouchedLetter.style.top = '';
            lastTouchedLetter = null;
        }
    };

    const getLetterAtPoint = (x, y) => {
        const el = document.elementFromPoint(x, y);
        return el?.classList.contains('hover-letter') ? el : null;
    };

    document.querySelectorAll('.logo a, .post-title').forEach(container => {
        container.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const letter = getLetterAtPoint(touch.clientX, touch.clientY);
            if (letter) activateLetter(letter);
        }, { passive: true });

        container.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const letter = getLetterAtPoint(touch.clientX, touch.clientY);
            if (letter) activateLetter(letter);
        }, { passive: true });

        container.addEventListener('touchend', deactivateLetter, { passive: true });
        container.addEventListener('touchcancel', deactivateLetter, { passive: true });
    });
}

// ==========================================================================
// CARD HOVER CONFIGURATION
// Adjust these values to tune the desktop card hover effect
// ==========================================================================
const CARD_CONFIG = {
    // Z-axis displacement on hover (px) - makes card appear to lift
    hoverLift: 4,
    // Maximum rotation in degrees (at card edge)
    maxRotation: 0.8,
    // Shadow settings - opacity values
    shadowOpacityLight: 0.22,      // Light mode base shadow opacity
    shadowOpacityDark: 0.45,       // Dark mode base shadow opacity
    shadowOpacityRange: 0.12,      // How much shadow varies with mouse Y position
    // Shadow blur/spread - increases on hover to simulate elevation
    shadowBlurBase: 1.5,           // Base blur (non-hover)
    shadowBlurHover: 2.5,          // Blur during hover
    shadowYOffsetBase: 1,          // Base Y offset (non-hover)
    shadowYOffsetHover: 2,         // Y offset during hover
};
// ==========================================================================

// 3D tilt effect for post cards
const postCards = document.querySelectorAll('.post-entry');
const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;

if (isTouchDevice && window.isSecureContext && 'DeviceOrientationEvent' in window) {
    // Mobile: use gyroscope for all cards with RAF for smooth rendering
    // Plus scroll-based "focus" effect
    let gyroBaselineBeta = null;
    let gyroBaselineGamma = null;
    const GYRO_DRIFT_RATE_MIN = 0.0008;  // Slower recentering at low tilt
    const GYRO_DRIFT_RATE_MAX = 0.25;   // Faster recentering at high tilt
    let gyroRafId = null;
    let latestBeta = null, latestGamma = null;
    let cardGyroPermissionRequested = false;

    // Current gyro rotation and translation values
    let currentRotateX = 0, currentRotateY = 0;
    let currentTranslateX = 0, currentTranslateY = 0;

    // Smoothed values to prevent stuttering at high tilts
    let smoothedRotateX = 0, smoothedRotateY = 0;
    let smoothedTranslateX = 0, smoothedTranslateY = 0;
    const CARD_GYRO_SMOOTHING = 0.15;

    // Soft clamp using tanh - smoothly approaches limit without hard stop
    const softClamp = (value, limit) => limit * Math.tanh(value / limit);

    // Scroll-based focus - dynamic "sweet spot" that moves based on scroll position
    let cardFocusValues = new Array(postCards.length).fill(0);
    let transformRafId = null;
    let scrollProgress = 0; // 0 = top of page, 1 = bottom of page

    // Batched transform application - prevents multiple RAF calls stacking up
    function scheduleTransformUpdate() {
        if (transformRafId) return;
        transformRafId = requestAnimationFrame(() => {
            applyCardTransforms();
            transformRafId = null;
        });
    }

    // Calculate focus values based on card position relative to dynamic target line
    function updateCardFocusValues() {
        const viewportHeight = window.innerHeight;
        // Target line moves from 15% (at top of scroll) to 85% (at bottom of scroll)
        const targetY = viewportHeight * (0.15 + scrollProgress * 0.7);

        for (let i = 0; i < postCards.length; i++) {
            const rect = postCards[i].getBoundingClientRect();
            const cardCenterY = rect.top + rect.height / 2;

            // Calculate distance from target line, normalized by viewport height
            const distance = Math.abs(cardCenterY - targetY) / viewportHeight;

            // Full focus within 40% of target, then quartic falloff to 0 at 75%
            const t = Math.max(0, (distance - 0.4) / 0.35);
            const falloff = Math.max(0, 1 - t);
            cardFocusValues[i] = falloff * falloff * (falloff * falloff); // Quartic
        }
    }

    // Track scroll position
    let scrollRafId = null;
    function handleScroll() {
        if (scrollRafId) return;
        scrollRafId = requestAnimationFrame(() => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            scrollProgress = maxScroll > 0 ? Math.min(1, Math.max(0, scrollTop / maxScroll)) : 0;

            updateCardFocusValues();
            scheduleTransformUpdate();
            scrollRafId = null;
        });
    }
    window.addEventListener('scroll', handleScroll, { passive: true });

    // Initial calculation
    handleScroll();

    function applyCardTransforms() {
        // Apply smoothing to prevent stuttering
        smoothedRotateX += (currentRotateX - smoothedRotateX) * CARD_GYRO_SMOOTHING;
        smoothedRotateY += (currentRotateY - smoothedRotateY) * CARD_GYRO_SMOOTHING;
        smoothedTranslateX += (currentTranslateX - smoothedTranslateX) * CARD_GYRO_SMOOTHING;
        smoothedTranslateY += (currentTranslateY - smoothedTranslateY) * CARD_GYRO_SMOOTHING;

        // Pre-compute gyro values once (outside loop)
        const baseGyroX = smoothedRotateX * 0.3;
        const baseGyroY = smoothedRotateY * 0.3;
        const gyroRangeX = smoothedRotateX * 0.7;
        const gyroRangeY = smoothedRotateY * 0.7;
        // Translation: slight base + more for focused cards
        const baseTransX = smoothedTranslateX * 0.3;
        const baseTransY = smoothedTranslateY * 0.3;
        const transRangeX = smoothedTranslateX * 0.7;
        const transRangeY = smoothedTranslateY * 0.7;

        for (let i = 0; i < postCards.length; i++) {
            const focus = cardFocusValues[i];
            const card = postCards[i];

            // Simplified calculations
            const rotX = baseGyroX + gyroRangeX * focus;
            const rotY = baseGyroY + gyroRangeY * focus;
            const transX = baseTransX + transRangeX * focus;
            const transY = baseTransY + transRangeY * focus;

            card.style.transform = `perspective(1000px) rotateX(${rotX}deg) rotateY(${rotY}deg) translateX(${transX}px) translateY(${transY}px) scale(${1 + focus * 0.02})`;
            card.style.opacity = 0.55 + focus * 0.45;
        }
    }

    function handleCardOrientation(event) {
        if (event.beta === null || event.gamma === null) return;

        // Adjust axes based on screen orientation
        const orientation = screen.orientation?.angle ?? window.orientation ?? 0;
        let beta, gamma;

        if (orientation === 90) {
            beta = event.gamma;
            gamma = -event.beta;
        } else if (orientation === -90 || orientation === 270) {
            beta = -event.gamma;
            gamma = event.beta;
        } else if (orientation === 180) {
            beta = -event.beta;
            gamma = -event.gamma;
        } else {
            beta = event.beta;
            gamma = event.gamma;
        }

        latestBeta = beta;
        latestGamma = gamma;

        if (!gyroRafId) {
            gyroRafId = requestAnimationFrame(() => {
                // Calibrate on first reading
                if (gyroBaselineBeta === null) {
                    gyroBaselineBeta = latestBeta;
                    gyroBaselineGamma = latestGamma;
                }

                // Calculate relative tilt from baseline
                const relativeBeta = latestBeta - gyroBaselineBeta;
                const relativeGamma = latestGamma - gyroBaselineGamma;

                // Adaptive drift rate: very slow at low tilt, fast at high tilt
                const maxTilt = Math.max(Math.abs(relativeBeta), Math.abs(relativeGamma));
                const tiltFactor = Math.min(1, maxTilt / 30);  // Threshold lowered to 30 degrees
                // Cubic curve for steeper transition - stays slow longer, then ramps up fast
                const driftRate = GYRO_DRIFT_RATE_MIN + tiltFactor * tiltFactor * tiltFactor * (GYRO_DRIFT_RATE_MAX - GYRO_DRIFT_RATE_MIN);

                // Drift baseline toward current orientation
                gyroBaselineBeta += (latestBeta - gyroBaselineBeta) * driftRate;
                gyroBaselineGamma += (latestGamma - gyroBaselineGamma) * driftRate;

                // Map tilt to rotation - use soft clamp for smooth limits
                currentRotateY = softClamp(relativeGamma * 0.25, 6);
                currentRotateX = softClamp(relativeBeta * -0.25, 6);

                // Translation based on tilt (in pixels) - use soft clamp
                currentTranslateX = softClamp(relativeGamma * 0.16, 4);
                currentTranslateY = softClamp(relativeBeta * 0.14, 3);

                scheduleTransformUpdate();
                gyroRafId = null;
            });
        }
    }

    function enableCardGyroscope() {
        window.addEventListener('deviceorientation', handleCardOrientation, { passive: true });
    }

    // Initial transform application (IntersectionObserver handles updates)
    applyCardTransforms();

    // Add touch feedback for tap (the "go down" animation)
    // Apply press immediately, cancel on scroll (touchmove)
    postCards.forEach((card, index) => {
        let isPressed = false;

        card.addEventListener('touchstart', () => {
            isPressed = true;
            const focus = cardFocusValues[index];
            card.style.transition = 'transform 0.08s ease-out, box-shadow 0.08s ease-out';
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale(${0.97 + focus * 0.01})`;
            card.style.boxShadow = `0 0.5px 1px rgba(0,0,0,0.2)`;
        }, { passive: true });

        card.addEventListener('touchmove', () => {
            if (isPressed) {
                isPressed = false;
                card.style.transition = '';
                scheduleTransformUpdate();
            }
        }, { passive: true });

        card.addEventListener('touchend', () => {
            if (isPressed) {
                isPressed = false;
                card.style.transition = 'transform 0.15s ease-out, box-shadow 0.15s ease-out';
                setTimeout(() => {
                    card.style.transition = '';
                    scheduleTransformUpdate();
                }, 150);
            }
        }, { passive: true });

        card.addEventListener('touchcancel', () => {
            isPressed = false;
            card.style.transition = '';
            scheduleTransformUpdate();
        }, { passive: true });
    });

    // iOS 13+ requires permission - must be triggered by user gesture
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        // Try enabling immediately - works if permission was already granted
        enableCardGyroscope();

        // Show a one-time banner to request gyroscope permission
        if (!localStorage.getItem('gyro-permission-asked') && postCards.length > 0) {
            const banner = document.createElement('div');
            banner.id = 'gyro-banner';
            banner.innerHTML = 'Tap to enable motion effects ↗';
            banner.style.cssText = 'position:fixed;bottom:1.2em;left:50%;transform:translateX(-50%);background:var(--entry);color:var(--content);padding:0.55em 1.2em;border-radius:2em;font-size:0.85em;z-index:999;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,0.18);border:1px solid var(--border);opacity:0;transition:opacity 0.3s;';
            document.body.appendChild(banner);
            // Fade in after a short delay
            setTimeout(() => { banner.style.opacity = '1'; }, 600);

            banner.addEventListener('click', () => {
                localStorage.setItem('gyro-permission-asked', '1');
                banner.style.opacity = '0';
                setTimeout(() => banner.remove(), 300);
                if (!cardGyroPermissionRequested) {
                    cardGyroPermissionRequested = true;
                    DeviceOrientationEvent.requestPermission()
                        .then(state => {
                            if (state === 'granted') enableCardGyroscope();
                        })
                        .catch(() => { cardGyroPermissionRequested = false; });
                }
            });

            // Auto-dismiss after 8 seconds
            setTimeout(() => {
                if (banner.parentNode) {
                    banner.style.opacity = '0';
                    setTimeout(() => banner.remove(), 300);
                }
            }, 8000);
        }
    } else {
        // Android - just enable directly
        enableCardGyroscope();
    }
} else {
    // Desktop: mouse tracking with RAF for smooth rendering
    // Track which card the mouse is currently over
    let currentMouseCard = null;
    let lastMouseX = 0, lastMouseY = 0;

    postCards.forEach(card => {
        let rafId = null;
        let isPressed = false;

        card.addEventListener('mouseenter', () => {
            currentMouseCard = card;
        });

        card.addEventListener('mousemove', (e) => {
            if (isPressed) return; // Don't update transform while pressed
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;

            if (!rafId) {
                rafId = requestAnimationFrame(() => {
                    if (isPressed) { rafId = null; return; }
                    const rect = card.getBoundingClientRect();
                    const mouseX = lastMouseX - rect.left;
                    const mouseY = lastMouseY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (mouseY - centerY) / centerY * -CARD_CONFIG.maxRotation;
                    const rotateY = (mouseX - centerX) / centerX * CARD_CONFIG.maxRotation;
                    const normalizedY = (centerY - mouseY) / centerY;
                    const isDarkMode = document.body.classList.contains('dark');
                    const baseOpacity = isDarkMode ? CARD_CONFIG.shadowOpacityDark : CARD_CONFIG.shadowOpacityLight;
                    const shadowOpacity = Math.max(0, baseOpacity + normalizedY * CARD_CONFIG.shadowOpacityRange);
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(${CARD_CONFIG.hoverLift}px)`;
                    card.style.boxShadow = `0 ${CARD_CONFIG.shadowYOffsetHover}px ${CARD_CONFIG.shadowBlurHover}px rgba(0, 0, 0, ${shadowOpacity})`;
                    rafId = null;
                });
            }
        });

        card.addEventListener('mousedown', () => {
            isPressed = true;
            card.style.transform = 'scale(0.99)';
            card.style.boxShadow = '';
        });

        card.addEventListener('mouseup', () => {
            isPressed = false;
        });

        card.addEventListener('mouseleave', () => {
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
            isPressed = false;
            card.style.transform = '';
            card.style.boxShadow = '';
            currentMouseCard = null;
        });
    });

}

// Make clicking anywhere on TOC box toggle it
const tocBox = document.querySelector('.toc');
if (tocBox) {
    const tocDetails = tocBox.querySelector('details');
    if (tocDetails) {
        tocBox.addEventListener('click', (e) => {
            // Don't toggle if clicking on a link inside the TOC
            if (e.target.tagName === 'A') return;
            // Don't toggle if clicking on the summary (it handles itself)
            if (e.target.closest('summary')) return;
            tocDetails.open = !tocDetails.open;
        });
    }
}
</script>
